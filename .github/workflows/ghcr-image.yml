name: Build GHCR Image

on:
  push:
    branches:
      - main
      - recover-muling-custom-202602
    tags:
      - "v*.*.*"
      - "custom-*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/charyeahowo/memos
  NODE_VERSION: "24"
  PNPM_VERSION: "11.0.1"

jobs:
  build:
    name: Build and Push GHCR Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build frontend release assets
        working-directory: web
        run: pnpm release

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          safe_ref="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]/' '[:lower:]-' | tr -cs 'a-z0-9_.-' '-' | sed 's/^-//; s/-$//')"

          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:sha-${short_sha}"

            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "${IMAGE_NAME}:${GITHUB_REF_NAME}"
              echo "${IMAGE_NAME}:${GITHUB_REF_NAME#v}"
            else
              echo "${IMAGE_NAME}:${safe_ref}"

              if [ "${GITHUB_REF_NAME}" = "recover-muling-custom-202602" ]; then
                echo "${IMAGE_NAME}:custom"
              fi

              if [ "${GITHUB_REF_NAME}" = "${GITHUB_DEFAULT_BRANCH}" ]; then
                echo "${IMAGE_NAME}:latest"
              fi
            fi

            echo "EOF"
            echo "version=${GITHUB_REF_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./scripts/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=ghcr-image
          cache-to: type=gha,mode=max,scope=ghcr-image

      - name: Inspect image
        run: docker buildx imagetools inspect "${IMAGE_NAME}:sha-${GITHUB_SHA::7}"
